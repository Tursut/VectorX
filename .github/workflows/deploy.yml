name: Deploy to production

# Production deploy on push to main:
#   1. Deploy the Cloudflare Worker to *.workers.dev, smoke-test /ping.
#   2. Build the client with VITE_ENABLE_ONLINE=true + VITE_SERVER_URL pointed
#      at the Worker URL just deployed, and publish dist/ to GitHub Pages.
#
# Requires repo secret: CLOUDFLARE_API_TOKEN (set in repo settings).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker to Cloudflare
    runs-on: ubuntu-latest
    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: wrangler deploy
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DEPLOY_LOG=$(npx wrangler deploy --config server/wrangler.toml 2>&1)
          echo "$DEPLOY_LOG"
          WORKER_URL=$(echo "$DEPLOY_LOG" | grep -m 1 -oE 'https://[a-z0-9.-]+\.workers\.dev' || true)
          if [ -z "$WORKER_URL" ]; then
            echo "::error::Failed to extract worker URL from wrangler output"
            exit 1
          fi
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed worker → $WORKER_URL"
      - name: Smoke-test /ping
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          RESP=$(curl -sf "$URL/ping")
          if [ "$RESP" != "pong" ]; then
            echo "::error::/ping returned '$RESP' (expected 'pong')"
            exit 1
          fi

  deploy-pages:
    name: Deploy client to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build with online enabled
        env:
          VITE_ENABLE_ONLINE: 'true'
          VITE_SERVER_URL: ${{ needs.deploy-worker.outputs.worker_url }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
