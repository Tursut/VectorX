name: Deploy preview

# Deploys the Cloudflare Worker to *.workers.dev and pushes an online-enabled
# client build to the `gh-pages-preview` branch. Triggered by pushes to the
# multiplayer feature branch.
#
# Prerequisite (one-time, repo owner):
#   Settings → Secrets → Actions → new secret: CLOUDFLARE_API_TOKEN
#     (Cloudflare dashboard → My Profile → API Tokens →
#      "Edit Cloudflare Workers" template)
#
# The worker URL is captured from wrangler's stdout and passed to the client
# build as VITE_SERVER_URL so the compiled bundle points at the live server.

on:
  push:
    branches: [claude/multiplayer-architecture-planning-X2NrO]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker to *.workers.dev
    runs-on: ubuntu-latest
    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: wrangler deploy
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DEPLOY_LOG=$(npx wrangler deploy --config server/wrangler.toml 2>&1)
          echo "$DEPLOY_LOG"
          # grep -m 1 stops after one match (no SIGPIPE to upstream); || true
          # keeps pipefail happy when the regex misses and we fall through to
          # the explicit empty-check below.
          WORKER_URL=$(echo "$DEPLOY_LOG" | grep -m 1 -oE 'https://[a-z0-9-]+\.workers\.dev' || true)
          if [ -z "$WORKER_URL" ]; then
            echo "::error::Failed to extract worker URL from wrangler output"
            exit 1
          fi
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed worker → $WORKER_URL"

      - name: Smoke-test /ping
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          RESP=$(curl -sf "$URL/ping")
          if [ "$RESP" != "pong" ]; then
            echo "::error::/ping returned '$RESP' (expected 'pong')"
            exit 1
          fi

  build-preview-client:
    name: Build + push preview client
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build with online flag pointed at preview worker
        env:
          VITE_ENABLE_ONLINE: 'true'
          VITE_SERVER_URL: ${{ needs.deploy-worker.outputs.worker_url }}
        run: npm run build

      - name: Push dist/ to gh-pages-preview branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-preview
          commit_message: "preview build → ${{ needs.deploy-worker.outputs.worker_url }}"
